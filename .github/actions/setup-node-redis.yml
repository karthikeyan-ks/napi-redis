name: Setup Node + Redis

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Redis
      run: sudo apt-get update && sudo apt-get install redis-server -y
      shell: bash

    - name: Start Redis
      run: redis-server --daemonize yes
      shell: bash

    - name: Wait for Redis
      run: |
        for i in {1..10}; do
          nc -z localhost 6379 && echo "Redis is up!" && exit 0
          echo "Waiting for Redis..."
          sleep 2
        done
        exit 1
      shell: bash